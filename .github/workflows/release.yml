name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: app
            context: .
            image_suffix: ""
          - name: web
            context: ./web
            image_suffix: /web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}:${{ github.ref_name }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}:${{ github.ref_name }}
          artifact-name: openjourney-${{ matrix.name }}-${{ github.ref_name }}.spdx.json
