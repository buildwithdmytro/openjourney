name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openjourney_test
          POSTGRES_USER: openjourney
          POSTGRES_PASSWORD: openjourney
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U openjourney"
          --health-interval 2s --health-timeout 2s --health-retries 20
    env:
      OPENJOURNEY_TEST_DATABASE_URL: postgres://openjourney:openjourney@localhost:5432/openjourney_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go test -p 1 -race ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  javascript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes @redocly/cli@1.34.3 lint api/openapi.yaml

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh -n scripts/*.sh
      - run: test -z "$(find scripts -name '*.sh' ! -perm -111 -print)"

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  smoke:
    runs-on: ubuntu-latest
    needs: [containers, scripts]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build api worker
      - run: ./scripts/smoke.sh
      - run: ./scripts/smoke-worker-termination.sh
      - run: ./scripts/smoke-campaign-delivery.sh
      - run: ./scripts/smoke-journeys.sh
      - run: ./scripts/rehearse-backup-restore.sh
      - if: always()
        run: docker compose down -v --remove-orphans

  telemetry-smoke:
    runs-on: ubuntu-latest
    needs: [containers, scripts]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build api worker
      - run: ./scripts/smoke-telemetry.sh
      - if: always()
        run: docker compose down -v --remove-orphans

  production-data-smoke:
    runs-on: ubuntu-latest
    needs: [containers, scripts]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f compose.yaml -f compose.production-data.yaml up -d --build
      - run: ./scripts/smoke-production-data.sh
      - if: always()
        run: docker compose -f compose.yaml -f compose.production-data.yaml down -v --remove-orphans

  load-smoke:
    runs-on: ubuntu-latest
    needs: [containers, scripts]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build api worker
      - run: ./scripts/load-smoke.sh
      - if: always()
        run: docker compose down -v --remove-orphans
