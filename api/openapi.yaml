openapi: 3.1.0
info:
  title: OpenJourney API
  version: 0.1.0
  description: Phase 1 event ingestion and profile projection API.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: http://localhost:8080
paths:
  /health/live:
    get:
      security: []
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive.
  /health/ready:
    get:
      security: []
      operationId: getReadiness
      responses:
        "200":
          description: Process and database are ready.
        "503":
          $ref: "#/components/responses/Error"
  /v1/events/batch:
    post:
      operationId: acceptEventBatch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              additionalProperties: false
              properties:
                events:
                  type: array
                  minItems: 1
                  maxItems: 75
                  items:
                    $ref: "#/components/schemas/Event"
      responses:
        "202":
          description: The events are durable and queued for projection.
          content:
            application/json:
              schema:
                type: object
                required: [status, event_ids]
                properties:
                  status:
                    const: accepted
                  event_ids:
                    type: array
                    items:
                      type: string
                      format: uuid
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/auth/login:
    post:
      operationId: loginLocalOperator
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              additionalProperties: false
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 12 }
      responses:
        "200":
          description: Local self-hosted operator session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/auth/logout:
    post:
      operationId: logoutLocalOperator
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Local self-hosted operator session revoked. API keys and OIDC tokens are ignored.
        "500": { $ref: "#/components/responses/Error" }
  /v1/profiles/{externalID}:
    get:
      operationId: getProfile
      security:
        - bearerAuth: []
      parameters:
        - name: externalID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current profile and consent projection.
          content:
            application/json:
              schema:
                type: object
                required: [profile, consents]
                properties:
                  profile:
                    $ref: "#/components/schemas/Profile"
                  consents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Consent"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/schemas:
    get:
      operationId: listEventSchemas
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Registered event schemas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items: { $ref: "#/components/schemas/EventSchema" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: createEventSchema
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EventSchemaInput" }
      responses:
        "201":
          description: Schema registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventSchema" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/api-keys:
    get:
      operationId: listAPIKeys
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: API key metadata; secrets are never returned.
          content:
            application/json:
              schema:
                type: object
                required: [api_keys]
                properties:
                  api_keys:
                    type: array
                    items: { $ref: "#/components/schemas/APIKey" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: createAPIKey
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              additionalProperties: false
              properties:
                name: { type: string }
                scopes: { type: array, minItems: 1, items: { type: string } }
                expires_at: { type: string, format: date-time }
      responses:
        "201":
          description: API key metadata and the one-time secret.
          content:
            application/json:
              schema:
                type: object
                required: [api_key, secret]
                properties:
                  api_key: { $ref: "#/components/schemas/APIKey" }
                  secret: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/api-keys/{id}:
    delete:
      operationId: revokeAPIKey
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: API key revoked. }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /v1/privacy/requests:
    post:
      operationId: createPrivacyRequest
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_id, request_type]
              additionalProperties: false
              properties:
                external_id: { type: string }
                request_type: { enum: [export, delete] }
      responses:
        "202":
          description: Durable privacy operation accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacyRequest" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/privacy/requests/{id}:
    get:
      operationId: getPrivacyRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Privacy operation state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacyRequest" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /v1/operations/queues:
    get:
      operationId: getQueueStatus
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Tenant queue depth by state. }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /v1/operations/dlq:
    get:
      operationId: listDeadLetters
      security: [{ bearerAuth: [] }]
      parameters:
        - name: queue
          in: query
          schema: { enum: [projection, outbox, operations] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Tenant-scoped dead-letter queue items.
          content:
            application/json:
              schema:
                type: object
                required: [dead_letters]
                properties:
                  dead_letters:
                    type: array
                    items: { $ref: "#/components/schemas/DeadLetterItem" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/operations/dlq/{queue}/{id}/retry:
    post:
      operationId: retryDeadLetter
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: queue, in: path, required: true, schema: { enum: [projection, outbox, operations] } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Dead-letter item was moved back to pending. }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/operations/dlq/{queue}/{id}/discard:
    post:
      operationId: discardDeadLetter
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: queue, in: path, required: true, schema: { enum: [projection, outbox, operations] } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Dead-letter item was discarded. }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/operations/replay/verify:
    post:
      operationId: verifyProfileReplay
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Live and replayed projections match.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplayReport" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409":
          description: Projection drift detected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplayReport" }
  /v1/roles:
    get:
      operationId: listRoles
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Tenant roles. }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: createRole
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name: { type: string }
                permissions: { type: array, minItems: 1, items: { type: string } }
      responses:
        "201": { description: Role created. }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/users:
    get:
      operationId: listUsers
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Provisioned local and OIDC users. }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: provisionUser
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_ids]
              anyOf:
                - required: [oidc_issuer, oidc_subject]
                - required: [email, password]
              properties:
                oidc_issuer: { type: string, format: uri }
                oidc_subject: { type: string }
                email: { type: string, format: email }
                display_name: { type: string }
                password: { type: string, minLength: 12, description: Optional local self-hosted user password. }
                role_ids: { type: array, minItems: 1, items: { type: string, format: uuid } }
      responses:
        "201": { description: User provisioned. }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /v1/experiments:
    get:
      operationId: listExperiments
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Experiments in the authenticated tenant and workspace.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Experiment" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
    post:
      operationId: createExperiment
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExperimentInput" }
      responses:
        "201":
          description: Experiment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Experiment" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/experiments/{id}:
    get:
      operationId: getExperiment
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Experiment details and variants.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Experiment" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
    put:
      operationId: updateExperiment
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExperimentInput" }
      responses:
        "200":
          description: Experiment updated; a running experiment's seed remains immutable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Experiment" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/experiments/{id}/rollout:
    post:
      operationId: rolloutExperiment
      description: Creates a campaign or immutable journey version pinned to the stored advisory winner. Requires an authenticated human user.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "201":
          description: Winning variant rollout version created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExperimentRollout" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys:
    get:
      operationId: listJourneys
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Draft and published journeys in the current workspace.
          content:
            application/json:
              schema:
                type: object
                required: [journeys]
                additionalProperties: false
                properties:
                  journeys:
                    type: array
                    items: { $ref: "#/components/schemas/Journey" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
    post:
      operationId: createJourney
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JourneyInput" }
      responses:
        "201":
          description: Journey draft created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Journey" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/dlq:
    get:
      operationId: getJourneyDLQ
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Lists dead steps and message intents in the dead letter queue.
          content:
            application/json:
              schema:
                type: object
                required: [steps, intents]
                additionalProperties: false
                properties:
                  steps:
                    type: array
                    items: { $ref: "#/components/schemas/JourneyStep" }
                  intents:
                    type: array
                    items: { $ref: "#/components/schemas/JourneyMessageIntent" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/dlq/{kind}/{id}/retry:
    post:
      operationId: retryJourneyDLQ
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: kind, in: path, required: true, schema: { type: string, enum: [step, steps, intent, intents] } }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Replay request accepted; item status set to pending.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}:
    get:
      operationId: getJourney
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Journey draft or published container.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Journey" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
    put:
      operationId: updateJourney
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JourneyInput" }
      responses:
        "200":
          description: Journey draft updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Journey" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}/publish:
    post:
      operationId: publishJourney
      description: Publishes with approval attributed to the authenticated user; API-key principals are not accepted.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "201":
          description: Journey draft published as an immutable version.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JourneyVersion" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}/backfill:
    post:
      operationId: backfillJourney
      description: Backfills with approval attributed to the authenticated user; API-key principals are not accepted.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [segment_id]
              additionalProperties: false
              properties:
                segment_id: { type: string, format: uuid }
      responses:
        "200":
          description: Members of the segment successfully enrolled into the journey's current published version.
          content:
            application/json:
              schema:
                type: object
                required: [enrolled_count]
                properties:
                  enrolled_count: { type: integer, example: 5 }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}/versions/{v}:
    get:
      operationId: getJourneyVersion
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: v, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        "200":
          description: Journey version details.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JourneyVersion" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
    put:
      operationId: setJourneyVersionStatus
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: v, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              additionalProperties: false
              properties:
                status: { type: string, enum: [active, paused, archived] }
      responses:
        "200":
          description: Status updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}/runs/{runID}/cancel:
    post:
      operationId: cancelJourneyRun
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: runID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Run canceled successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}/runs:
    get:
      operationId: listJourneyRuns
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: List of runs for the journey.
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JourneyRun"
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/journeys/{id}/runs/{runID}/transitions:
    get:
      operationId: listJourneyRunTransitions
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: runID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: List of transitions for the journey run.
          content:
            application/json:
              schema:
                type: object
                required: [transitions]
                properties:
                  transitions:
                    type: array
                    items:
                      $ref: "#/components/schemas/JourneyTransition"
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /v1/audit:
    get:
      operationId: listAuditEvents
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Most recent tenant/workspace audit events.
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Event:
      type: object
      additionalProperties: false
      required: [event_type, schema_version, idempotency_key, occurred_at, payload]
      anyOf:
        - required: [external_id]
        - required: [anonymous_id]
      properties:
        event_type:
          type: string
          examples: [profile.updated, consent.changed, product.viewed]
        schema_version:
          type: integer
          minimum: 1
        external_id:
          type: string
        anonymous_id:
          type: string
        idempotency_key:
          type: string
        occurred_at:
          type: string
          format: date-time
        source:
          type: string
        source_event_id:
          type: string
        correlation_id:
          type: string
        causation_id:
          type: string
        traceparent:
          type: string
        data_classification:
          enum: [public, internal, confidential, restricted]
        consent_context:
          type: object
          additionalProperties: true
        payload:
          type: object
          additionalProperties: true
    Profile:
      type: object
      required: [id, attributes, version, updated_at]
      properties:
        id:
          type: string
          format: uuid
        external_id:
          type: string
        anonymous_id:
          type: string
        attributes:
          type: object
          additionalProperties: true
        version:
          type: integer
        updated_at:
          type: string
          format: date-time
    Consent:
      type: object
      required: [profile_id, channel, topic, state, occurred_at]
      properties:
        profile_id:
          type: string
          format: uuid
        channel:
          type: string
        topic:
          type: string
        state:
          enum: [subscribed, unsubscribed]
        occurred_at:
          type: string
          format: date-time
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    AuthSession:
      type: object
      required: [access_token, token_type, expires_at]
      properties:
        access_token: { type: string }
        token_type: { const: Bearer }
        expires_at: { type: string, format: date-time }
    EventSchemaInput:
      type: object
      required: [event_type, version, schema]
      additionalProperties: false
      properties:
        event_type: { type: string }
        version: { type: integer, minimum: 1 }
        compatibility: { enum: [none, backward], default: backward }
        schema: { type: object, additionalProperties: true }
    EventSchema:
      allOf:
        - $ref: "#/components/schemas/EventSchemaInput"
        - type: object
          required: [id, status, created_at]
          properties:
            id: { type: string, format: uuid }
            status: { enum: [active, deprecated] }
            created_at: { type: string, format: date-time }
    APIKey:
      type: object
      required: [id, name, scopes, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        scopes:
          type: array
          items: { type: string }
        expires_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    PrivacyRequest:
      type: object
      required: [id, external_id, request_type, status, created_at]
      properties:
        id: { type: string, format: uuid }
        external_id: { type: string }
        request_type: { enum: [export, delete] }
        status: { enum: [pending, processing, complete, failed] }
        artifact_key: { type: string }
        error: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
    ReplayReport:
      type: object
      required: [match, live_checksum, replay_checksum, event_count, profile_count]
      properties:
        match: { type: boolean }
        live_checksum: { type: string }
        replay_checksum: { type: string }
        event_count: { type: integer }
        profile_count: { type: integer }
    DeadLetterItem:
      type: object
      required: [queue, id, kind, attempts, created_at]
      properties:
        queue: { enum: [projection, outbox, operations] }
        id: { type: string }
        subject_id: { type: string }
        kind: { type: string }
        attempts: { type: integer }
        last_error: { type: string }
        payload: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    ExperimentVariantInput:
      type: object
      required: [label, weight]
      additionalProperties: false
      properties:
        label: { type: string, minLength: 1 }
        weight: { type: integer, minimum: 0 }
        is_control: { type: boolean, default: false }
        template_id: { type: string, format: uuid }
    ExperimentVariant:
      allOf:
        - $ref: "#/components/schemas/ExperimentVariantInput"
        - type: object
          required: [id, experiment_id, tenant_id, is_control, created_at]
          properties:
            id: { type: string, format: uuid }
            experiment_id: { type: string, format: uuid }
            tenant_id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
    ExperimentInput:
      type: object
      required: [name, subject_type, seed]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        subject_type: { enum: [campaign, journey] }
        status: { enum: [draft, running, completed, archived], default: draft }
        method: { const: frequentist, default: frequentist }
        seed: { type: string, minLength: 1 }
        holdout_pct: { type: integer, minimum: 0, maximum: 100, default: 0 }
        primary_goal:
          type: object
          additionalProperties: true
        guardrail_goals:
          type: array
          items:
            type: object
            additionalProperties: true
          default: []
        winner_variant: { type: string }
        variants:
          type: array
          items: { $ref: "#/components/schemas/ExperimentVariantInput" }
    Experiment:
      allOf:
        - $ref: "#/components/schemas/ExperimentInput"
        - type: object
          required: [id, tenant_id, workspace_id, status, method, holdout_pct, guardrail_goals, created_at, updated_at]
          properties:
            id: { type: string, format: uuid }
            tenant_id: { type: string, format: uuid }
            workspace_id: { type: string, format: uuid }
            variants:
              type: array
              items: { $ref: "#/components/schemas/ExperimentVariant" }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    ExperimentRollout:
      type: object
      required: [experiment_id, winner_variant, subject_type]
      additionalProperties: false
      properties:
        experiment_id: { type: string, format: uuid }
        winner_variant: { type: string }
        subject_type: { enum: [campaign, journey] }
        campaign:
          type: object
          additionalProperties: true
          description: Newly scheduled campaign pinned to the winning template.
        journey_version: { $ref: "#/components/schemas/JourneyVersion" }
    JourneyInput:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        status: { enum: [draft, published, archived], default: draft }
        graph:
          type: object
          additionalProperties: true
          default: {}
    Journey:
      allOf:
        - $ref: "#/components/schemas/JourneyInput"
        - type: object
          required: [id, tenant_id, workspace_id, status, graph, latest_version, created_at, updated_at]
          properties:
            id: { type: string, format: uuid }
            tenant_id: { type: string, format: uuid }
            workspace_id: { type: string, format: uuid }
            latest_version: { type: integer, minimum: 0 }
            current_version_id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    JourneyVersion:
      type: object
      required: [id, journey_id, tenant_id, workspace_id, version, graph, entry_kind, reentry_policy, max_reentries, late_policy, status, published_at]
      properties:
        id: { type: string, format: uuid }
        journey_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        graph:
          type: object
          additionalProperties: true
        manifest_key: { type: string }
        entry_kind: { enum: [event, scheduled] }
        entry_event_type: { type: string }
        entry_segment_id: { type: string, format: uuid }
        entry_schedule: { type: string }
        reentry_policy: { enum: [once, always, after_exit] }
        max_reentries: { type: integer, minimum: 0 }
        late_policy: { enum: [run, skip, reschedule] }
        status: { enum: [active, paused, archived] }
        published_by: { type: string, format: uuid }
        published_at: { type: string, format: date-time }
    JourneyStep:
      type: object
      required: [id, run_id, tenant_id, node_id, kind, status, attempts, available_at, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        node_id: { type: string }
        kind: { enum: [advance, timeout] }
        status: { enum: [pending, processing, completed, failed, dead] }
        attempts: { type: integer, minimum: 0 }
        available_at: { type: string, format: date-time }
        locked_until: { type: string, format: date-time }
        error_message: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    JourneyMessageIntent:
      type: object
      required: [id, run_id, tenant_id, workspace_id, journey_id, journey_version_id, node_id, profile_id, template_id, channel, endpoint, transactional, status, attempts, available_at, policy_snapshot, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        journey_id: { type: string, format: uuid }
        journey_version_id: { type: string, format: uuid }
        node_id: { type: string }
        profile_id: { type: string, format: uuid }
        template_id: { type: string, format: uuid }
        channel: { type: string }
        endpoint: { type: string }
        transactional: { type: boolean }
        status: { enum: [pending, processing, completed, failed, dead] }
        attempts: { type: integer, minimum: 0 }
        available_at: { type: string, format: date-time }
        locked_until: { type: string, format: date-time }
        decision: { type: string }
        reason: { type: string }
        provider_message_id: { type: string }
        policy_snapshot:
          type: object
          additionalProperties: true
        error_message: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    JourneyRun:
      type: object
      required: [id, tenant_id, workspace_id, journey_id, journey_version_id, profile_id, subject_external_id, entry_key, reentry_sequence, status, current_node_id, entered_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        journey_id: { type: string, format: uuid }
        journey_version_id: { type: string, format: uuid }
        profile_id: { type: string, format: uuid }
        subject_external_id: { type: string }
        entry_key: { type: string }
        reentry_sequence: { type: integer }
        status: { enum: [active, completed, canceled] }
        current_node_id: { type: string }
        state:
          type: object
          additionalProperties: true
        wait_event_type: { type: string }
        wait_until: { type: string, format: date-time }
        goal_reached: { type: boolean }
        entered_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
    JourneyTransition:
      type: object
      required: [id, run_id, tenant_id, node_type, outcome, occurred_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        from_node: { type: string }
        to_node: { type: string }
        node_type: { type: string }
        outcome: { type: string }
        detail:
          type: object
          additionalProperties: true
        occurred_at: { type: string, format: date-time }
